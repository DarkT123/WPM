name: TranslatingKeyboard

options:
  bundleIdPrefix: com.yourname.translatingkeyboard
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:

  # ─── Container App ───────────────────────────────────────────────
  TranslatingKeyboard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: TranslatingKeyboard
        excludes:
          - "**/*.entitlements"
      - path: Shared

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.translatingkeyboard
        INFOPLIST_FILE: TranslatingKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: TranslatingKeyboard/TranslatingKeyboard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    dependencies:
      - target: TranslatingKeyboardExtension
        embed: true

  # ─── Keyboard Extension ──────────────────────────────────────────
  TranslatingKeyboardExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: TranslatingKeyboardExtension
        excludes:
          - "**/*.entitlements"
      - path: Shared

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.translatingkeyboard.keyboard
        INFOPLIST_FILE: TranslatingKeyboardExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: TranslatingKeyboardExtension/TranslatingKeyboardExtension.entitlements
